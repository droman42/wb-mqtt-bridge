; platformio.ini — one image for all four bridge boxes.
; First flash over serial; thereafter upload OTA (no USB ever again).
[platformio]
default_envs = serial

[env]
platform  = espressif32
board     = esp32dev            ; generic WROOM-32
framework  = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient @ ^2.8
build_flags =
    -DMQTT_MAX_PACKET_SIZE=1024
; Partition table with dual OTA slots + rollback safety:
board_build.partitions = default.csv

; ---- First flash (USB serial), once per box ----
[env:serial]
upload_protocol = esptool
; After flashing, set the box identity WITHOUT a cable by publishing (retained)
; the device id to MQTT topic /provision, e.g.:
;   mosquitto_pub -h <broker> -t /provision -r -m revox_b215
; The box stores it in NVS and reboots into that driver.

; ---- OTA upload (all subsequent updates) ----
; Set upload_port to the box's hostname (wbbridge-<device_id>.local) or its IP.
[env:ota]
upload_protocol = espota
upload_port     = wbbridge-revox_b215.local
upload_flags    =
    --auth=CHANGE_ME_OTA
