# locveil-bridge ledger-discipline config for the vendored scope-guard
# (scripts/scope_guard.py, pinned at scope-v6; normative conventions:
# ../locveil-commons/process/ledger-discipline.md + process/claude-md.md). Adopted by
# OPS-22 from the PROD-13-verified starter; [claude] blocks by OPS-16 (PROD-5/HK-2).
# Behavior changes happen in commons — re-pin, don't edit the vendored script.

[ledger]
active = "docs/action_plan.md"
done = "docs/action_plan_DONE.md"
archive_dir = "docs/archive/ledger"      # created by the first DONE rotation
aliases = "docs/action_plan_aliases.md"
prefixes = ["DRV", "SCN", "VWB", "UI", "OPS", "CORE", "LIB", "DOC", "REL"]
open_statuses = [" ", "~"]
require_sections = true
sections_required_for_all = true         # bridge: every task row inside a PFX section
tombstones = true
high_water = 3000
low_water = 2000
hard_ceiling = 4000
# docs-verdict rule (scope-v5, HK-6): completion entries dated on/after this date must
# carry a `docs:` verdict line (process/user-docs.md §3). Set to the day AFTER the
# PROD-17 cutover — same-day entries predate the manifest.
docs_verdict_since = "2026-07-13"

[evidence]
dirs = ["docs/design", "docs/review"]
index = false
link_scan = true                         # ledger references docs/design|review paths
# unreferenced (scope-v6, HK-10/IMPL-2): an evidence doc on disk that no active/DONE entry
# names is forgotten scope. Adopt at the consumer default `warn` (commons uses `error`) —
# the four pre-existing unreferenced docs are anchored/reconciled by DOC-18; flip to `error`
# once that lands to lock the fourth direction in.
unreferenced = "warn"

[journal]
active = "docs/action_plan_journal.md"
archive_dir = "docs/archive/journal"
high_water = 1500
low_water = 1000
hard_ceiling = 2000
completion_crosscheck = false            # predates the journal — would flag history
archive_pointer = true

[claude]
file = "CLAUDE.md"
[[claude.blocks]]
name = "shared-invariants"
sha256 = "71d1c3bb3a6de0626a4c9ab8709f2e31166c866cede31c345fc93a58e4345218"
[[claude.blocks]]
name = "cross-repo-board"
sha256 = "0f5e8f63b55c752ddfd542e112f06dd1a6d615c38f1b6f1d57dbeaee7dbdb86a"
