# ops/docker-compose.yml — standard-Docker deploy for the Wirenboard.
# Replaces the WB-native docker_manager path (action_plan §5.1: "want standard
# tooling, accept the WB-integration trade-offs").
#
# Both services run on the host network so they reach the WB's mosquitto
# broker on localhost:1883 — the WB's broker is the system MQTT, not a
# separate container.
#
# On-controller layout (two trees, deliberately):
#   /mnt/sdcard/wb-mqtt-bridge/      — this repo, cloned; needed ONLY at update time
#   /mnt/data/mqtt-bridge-config/    — the RUNTIME tree; everything boot needs
#     ├── docker-compose.yml  <- THIS FILE, deployed there by update.sh
#     ├── .env                <- reports token (user-created, never synced)
#     ├── config/             <- synced from the clone's backend/config by update.sh
#     ├── data/               <- SQLite state store (survives updates)
#     └── logs/               <- service logs
# The systemd unit runs compose FROM the runtime tree so a reboot never depends
# on the lazily-automounted SD card. The runtime tree keeps the historical
# docker_manager-era layout; the mounts below are therefore ABSOLUTE paths.
#
# Bring up:   docker compose up -d
# Update:     ./update.sh                 (syncs config + pulls + restarts)
# Stop:       docker compose down
# Logs:       docker compose logs -f      ([backend|ui] to filter)
#
# A systemd unit (wb-mqtt-bridge.service) runs `up -d` on boot. See INSTALL.md.

services:
  backend:
    image: ghcr.io/locveil/wb-mqtt-bridge:latest
    container_name: wb-mqtt-bridge
    restart: unless-stopped
    network_mode: host                # reach WB mosquitto on localhost:1883
    mem_limit: 256m
    cpus: 0.5
    volumes:
      # The runtime tree (see the layout note at the top). config/ is read-only
      # and populated by update.sh's sync from the clone's backend/config — the
      # repo stays the single source of truth; `git pull` + update.sh delivers it.
      - /mnt/data/mqtt-bridge-config/config:/app/config:ro
      - /mnt/data/mqtt-bridge-config/data:/app/data
      - /mnt/data/mqtt-bridge-config/logs:/app/logs
    environment:
      # Problem-report filing (when system.json enables reports): the fine-grained
      # GitHub PAT reaches the container via the `.env` file next to the DEPLOYED
      # copy of this compose file in the runtime tree (user-created, outside git;
      # see INSTALL.md "Enabling problem reports"). Compose reads .env for BOTH
      # start paths: the systemd unit and update.sh — each runs compose from the
      # runtime tree. Empty default keeps reports-disabled deployments quiet.
      WB_REPORTS_TOKEN: "${WB_REPORTS_TOKEN:-}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ui:
    image: ghcr.io/locveil/wb-mqtt-ui:latest
    container_name: wb-mqtt-ui
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend
    mem_limit: 128m
    cpus: 0.3
    environment:
      # nginx envsubst inside the UI image picks these up at start
      # (ui/docker-entrypoint.sh) — see ui/README.md.
      BACKEND_HOST: "127.0.0.1"
      BACKEND_PORT: "8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
