name: Build ARM Docker Images (backend + ui)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# INTERIM (2026-05-22): the slow QEMU arm/v7 image builds (~14 min for the UI) are gated to MANUAL
# ONLY — they run on workflow_dispatch (`gh workflow run "Build ARM Docker Images (backend + ui)"`
# or the Actions "Run workflow" button), never on push. Fast checks (backend tests, UI
# codegen/typecheck/lint) run on every push. (A commit-message marker was dropped — it matched any
# message that merely mentioned the token.) To build on every push again, delete the `if:` lines on
# the backend-build-arm and ui-image jobs.

jobs:
  # --------------------------------------------------- fast checks (every push) ---
  backend-test:
    name: Backend tests (amd64)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          # Pin via backend/.python-version (single source of truth — uv also reads it).
          # The earlier '3.11' floating tag drifted to 3.11.15 (current runner), which
          # broke 13 tests via Python's stricter asyncio.Future() / get_event_loop()
          # behaviour in sync fixture contexts. The 3 offending fixtures were rewritten
          # to AsyncMock in the same commit, but the pin keeps us deterministic regardless.
          python-version-file: backend/.python-version
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -v -m "not requires_device" --tb=short

  ui-validate:
    name: UI validate (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install Node dependencies
        working-directory: ui
        run: npm ci
      - name: Verify backend contract present
        run: ls -la backend/openapi.json
      - name: Check (typecheck + lint)
        working-directory: ui
        run: npm run check

  # ----------------------- gated ARM image builds (slow; manual workflow_dispatch) ---
  # Builds linux/arm/v7 images for backend + UI and PUSHES them to GHCR.
  #   ghcr.io/droman42/wb-mqtt-bridge:<tag>   (backend)
  #   ghcr.io/droman42/wb-mqtt-ui:<tag>       (UI)
  # Tags emitted per build: `latest`, `sha-<short>`, `vYYYYMMDD-<short>`.
  # Auth is the workflow's built-in GITHUB_TOKEN (no separate PAT). On first push,
  # the packages will be PRIVATE — flip to public in repo Settings → Packages so
  # the WB pulls anonymously. See ops/INSTALL.md.
  backend-build-arm:
    name: Backend ARM image (GHCR push)
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wb-mqtt-bridge
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=v{{date 'YYYYMMDD'}}-{{sha}}
      - name: Build + push backend ARM image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          build-args: |
            ARCH=arm32v7
            LEAN=true

  ui-image:
    name: UI ARM image (GHCR push)
    runs-on: ubuntu-latest
    needs: ui-validate
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wb-mqtt-ui
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=v{{date 'YYYYMMDD'}}-{{sha}}
      - name: Build + push UI ARM image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ui/Dockerfile
          platforms: linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
