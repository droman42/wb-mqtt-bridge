name: Build ARM Docker Images (backend + ui)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_backend:
        description: Build + push the backend ARM image
        type: boolean
        default: true
      build_ui:
        description: Build + push the UI ARM image
        type: boolean
        default: true

# Job graph (OPS-10): a `changes` job detects which areas a push touched and gates the
# fast checks — backend-test runs only when backend/** changed, ui-validate when ui/**
# OR the backend contract files the UI consumes changed, ledger-guard when docs/** or
# the guard script changed. Docs-only ledger commits (the most frequent kind) skip the
# test suites entirely. The slow QEMU arm/v7 image builds (~14 min for the UI) remain
# MANUAL ONLY (`gh workflow run "Build ARM Docker Images (backend + ui)"` or the Actions
# "Run workflow" button), now with per-image toggles; a dispatch also forces the matching
# fast checks, since each image build `needs` its green gate.

# A newer push cancels the previous run's still-in-flight fast checks. The event name is
# part of the group so a push never cancels a manually dispatched image build.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------- what changed? ---
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      ledger: ${{ steps.filter.outputs.ledger }}
    steps:
      # Full history: a multi-commit push must diff against the push base, not HEAD~1.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              # committed contract artifacts (VWB-15): the backend suite carries the
              # drift guard (test_contracts_golden), so a hand-edit of contracts/
              # must run it.
              - 'contracts/**'
              - '.github/workflows/build-arm.yml'
            ui:
              # ui/ plus the backend contract it consumes (openapi.json for codegen,
              # config/ for device-state mapping + device configs) — a backend-side
              # contract change must re-validate the UI (config-ui-stays-functional).
              - 'ui/**'
              - 'backend/openapi.json'
              - 'backend/config/**'
              - '.github/workflows/build-arm.yml'
            ledger:
              - 'docs/**'
              - 'scripts/scope_guard.py'
              - '.scope-guard.toml'
              # the guard's claudemd hash rule (OPS-16) checks the pinned blocks in here
              - 'CLAUDE.md'

  # --------------------------------------------------- fast checks (gated) ---
  ledger-guard:
    # docs/action_plan.md{,_DONE} single-source-of-scope check (single-task-ledger
    # invariant; DOC-4, cut over to the commons scope-guard by OPS-22 — vendored at
    # scope-v3, config in .scope-guard.toml). Standalone job: scope drift lives in
    # docs/, and docs-only commits skip backend-test — the guard must not ride a job
    # that gets skipped.
    name: Ledger scope-drift guard
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ledger == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - run: python3 scripts/scope_guard.py --config .scope-guard.toml

  backend-test:
    name: Backend tests (amd64)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || (github.event_name == 'workflow_dispatch' && inputs.build_backend)
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      # All three Python health gates (import-linter / check-no-type-checking
      # / pyright) run via the shared composite action in droman42/py-dev-gates.
      # The action handles its own python setup + install of the project's
      # [dev] extras; tests run separately below.
      - uses: droman42/py-dev-gates/.github/actions/python-health@v0.1.1
        with:
          src: src/wb_mqtt_bridge
          working-directory: backend
      - name: Run tests
        run: pytest -v -m "not requires_device" --tb=short

  ui-validate:
    name: UI validate (typecheck + lint + orphans + build)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ui == 'true' || (github.event_name == 'workflow_dispatch' && inputs.build_ui)
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install Node dependencies
        run: npm ci
      - name: Verify backend contract present
        working-directory: .
        run: ls -la backend/openapi.json
      - name: Generate API types from backend contract
        # Build needs api.gen.ts; openapi.json is committed so this is
        # deterministic. Same step runs locally on `npm run gen:api-types`.
        run: npm run gen:api-types
      - name: Check (typecheck + lint + orphans)
        # `check` now includes check:orphans (node scripts/find-orphans.mjs),
        # the static-import-graph walker that fails on any module unreachable
        # from src/app/main.tsx + src/app/App.tsx + any test file.
        run: npm run check
      - name: Build
        # Hard-fail at build time. `tsc && vite build` catches type/import
        # regressions that `tsc --noEmit` (in `check`) doesn't see at the
        # bundle level (e.g. circular imports that defer resolution).
        run: npm run build
      # NOTE: `npm test` (jest) intentionally NOT wired -- the project ships
      # zero test files today + the jest preset is misconfigured. Adding the
      # step would either silently pass (no tests collected) or block CI on
      # honest-red noise. Re-enable once the test framework is on its feet
      # (likely a vitest migration; see CONTRIBUTING for the deferral note).

  # ----------------------- gated ARM image builds (slow; manual workflow_dispatch) ---
  # Builds linux/arm/v7 images for backend + UI and PUSHES them to GHCR.
  #   ghcr.io/locveil/locveil-bridge:<tag>   (backend)
  #   ghcr.io/locveil/locveil-bridge-ui:<tag>       (UI)
  # Tags emitted per build: `latest`, `sha-<short>`, `vYYYYMMDD-<short>`.
  # Auth is the workflow's built-in GITHUB_TOKEN (no separate PAT). On first push,
  # the packages will be PRIVATE — flip to public in repo Settings → Packages so
  # the WB pulls anonymously. See ops/INSTALL.md.
  backend-build-arm:
    name: Backend ARM image (GHCR push)
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'workflow_dispatch' && inputs.build_backend
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/locveil-bridge
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=v{{date 'YYYYMMDD'}}-{{sha}}
      - name: Build + push backend ARM image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          build-args: |
            ARCH=arm32v7
            LEAN=true

  ui-image:
    name: UI ARM image (GHCR push)
    runs-on: ubuntu-latest
    needs: ui-validate
    if: github.event_name == 'workflow_dispatch' && inputs.build_ui
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/locveil-bridge-ui
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=v{{date 'YYYYMMDD'}}-{{sha}}
      - name: Build + push UI ARM image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ui/Dockerfile
          platforms: linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
